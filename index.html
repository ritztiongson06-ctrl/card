<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Surprise</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: black;
        color: lime;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .virus-box {
        border: 2px solid lime;
        padding: 30px;
        background-color: #000;
        box-shadow: 0 0 20px lime;
    }

    button {
        margin: 10px;
        padding: 10px 20px;
        background-color: black;
        border: 1px solid lime;
        color: lime;
        cursor: pointer;
    }

    button:hover {
        background-color: lime;
        color: black;
    }

    .hidden {
        display: none;
    }

    .card {
        background: pink;
        color: black;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px white;
    }

    .card img {
        width: 200px;
        border-radius: 10px;
        margin-top: 20px;
    }

    h1 {
        color: red;
    }
</style>
</head>
<body>

<div id="virusScreen" class="virus-box">
    <h2>⚠ SYSTEM ALERT ⚠</h2>
    <p>Suspicious file detected...</p>
    <p>Do you want to proceed?</p>
    <button onclick="showCard()">YES</button>
    <button onclick="showCard()">NO</button>
</div>

<div id="cardScreen" class="hidden">
    <div class="card">
        <h1>❤️ I LOVE YOU BEBI ❤️</h1>
        <p>You are my favorite person in the world 💖</p>
        <img src="bday.jpg
        " alt="GF Photo">
    </div>
</div>

<script>
function showCard() {
    document.getElementById("virusScreen").style.display = "none";
    document.getElementById("cardScreen").style.display = "block";
}
</script>

</body>
</html>
